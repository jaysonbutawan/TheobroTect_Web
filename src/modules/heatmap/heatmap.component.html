<div class="min-h-screen bg-slate-50/50 p-4 md:p-8 font-sans">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h2 class="text-4xl font-black text-slate-900 tracking-tight leading-none">
        Cacao Disease and Pest <span class="text-green-700">Distribution</span> Heatmap
      </h2>
      <p class="text-slate-500 mt-2 font-medium">
        Visualizing detection density across <span class="text-slate-800">Sawata</span> and nearby sectors.
      </p>
    </div>
  </div>

  <div class="mb-6 flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-slate-200 w-full max-w-7xl mx-auto">
    <div class="flex-1 flex items-center gap-3 px-4 py-2 bg-slate-50 rounded-xl border border-slate-100">
      <span class="material-symbols-rounded text-slate-400 text-sm">calendar_today</span>
      <input 
        type="date" 
        [(ngModel)]="filters.date"
        (change)="applyFilters()" 
        class="bg-transparent border-none text-xs font-bold text-slate-700 focus:ring-0 w-full outline-none"
      >
    </div>

    <div class="flex-1 flex items-center gap-3 px-4 py-2 bg-slate-50 rounded-xl border border-slate-100">
      <span class="material-symbols-rounded text-slate-400 text-sm">coronavirus</span>
      <select 
        [(ngModel)]="filters.disease"
        (change)="applyFilters()" 
        class="bg-transparent border-none text-xs font-bold text-slate-700 focus:ring-0 w-full outline-none appearance-none cursor-pointer"
      >
        <option value="all">All Diseases</option>
        <option value="black pod">Black Pod</option>
        <option value="cacao pod borer">Pod Borer</option>
        <option value="mealybug">Mealybug</option>
      </select>
    </div>

    <button 
      (click)="resetFilters()"
      class="px-4 py-2 bg-slate-900 text-white rounded-xl hover:bg-slate-800 transition-all active:scale-95 flex items-center gap-2"
    >
      <span class="material-symbols-rounded text-[18px]">filter_alt_off</span>
      <span class="text-xs font-bold">Clear</span>
    </button>
  </div>

  <div class="relative group max-w-7xl mx-auto">
    <div class="absolute bottom-10 right-10 z-[1000] bg-white/80 backdrop-blur-md p-6 rounded-[2.5rem] border border-white shadow-2xl w-64 hidden md:block">
      <div class="flex items-center justify-between mb-4">
        <h5 class="font-black text-slate-900 text-xs uppercase tracking-widest">Intensity</h5>
        <span class="material-symbols-rounded text-slate-400 text-sm">info</span>
      </div>

      <div class="h-3 w-full rounded-full bg-gradient-to-r from-blue-500 via-yellow-400 to-red-500 mb-2"></div>
      <div class="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-tighter">
        <span>Mild</span>
        <span>Moderate</span>
        <span>Severe</span>
      </div>

      <hr class="my-4 border-slate-100">

      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <div class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]"></div>
          <span class="text-[11px] font-bold text-slate-700">Black Pod Disease</span>
        </div>
        <div class="flex items-center gap-3">
          <div class="w-2.5 h-2.5 rounded-full bg-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.5)]"></div>
          <span class="text-[11px] font-bold text-slate-700">Cacao Pod Borer</span>
        </div>
        <div class="flex items-center gap-3">
          <div class="w-2.5 h-2.5 rounded-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.5)]"></div>
          <span class="text-[11px] font-bold text-slate-700">Mealybug</span>
        </div>
      </div>
    </div>

    <div class="absolute -inset-1 bg-gradient-to-r from-green-100 to-emerald-100 rounded-[2.5rem] blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>

    <div class="relative bg-white p-3 rounded-[2.5rem] shadow-xl shadow-slate-200/60 border border-white overflow-hidden">
      <div class="absolute top-6 left-6 z-[1000]">
        <button (click)="goBack()" class="flex items-center gap-2 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-md border border-slate-100 text-slate-700 hover:bg-slate-900 hover:text-white transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          <span class="font-bold text-sm">Dashboard</span>
        </button>
      </div>

      <div class="absolute top-6 right-6 z-[1000]">
        <button type="button" (click)="recenterMap()" class="bg-white/90 backdrop-blur p-2.5 rounded-xl shadow-md border border-slate-100 text-slate-600 hover:text-green-600 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
      </div>

      <div id="map" style="height: 600px;" class="rounded-[2rem] z-0"></div>
    </div>
  </div>
</div>
