<div class="min-h-screen bg-linear-to-br from-[#f0f7f0] via-[#e8f5e8] to-[#f5f5f0] flex flex-col items-center justify-center p-4">

  <!-- Card -->
  <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl shadow-green-900/10 p-8 md:p-12">

    <!-- Logo + Brand -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-20 h-20 bg-linear-to-br from-green-500 to-green-800 rounded-3xl flex items-center justify-center shadow-lg shadow-green-700/30 mb-5">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">TheobroTect</h1>
      <p class="text-sm text-slate-400 font-medium mt-1.5">Sign in to your account</p>
    </div>

    <!-- Error Message -->
    @if (errorMessage) {
      <div class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-600 rounded-2xl px-4 py-3.5 mb-6">
        <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-sm font-semibold">{{ errorMessage }}</p>
      </div>
    }

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Email -->
      <div class="space-y-2">
        <label class="block text-sm font-bold text-slate-600 ml-1">
          Username or Email
        </label>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input
            type="email"
            formControlName="email"
            placeholder="admin@theobrotect.com"
            class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 bg-slate-50 text-slate-800 text-base placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600/20 focus:border-green-600 focus:bg-white transition-all"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <div class="flex items-center justify-between ml-1">
          <label class="block text-sm font-bold text-slate-600">Password</label>
          <a href="#" class="text-xs font-semibold text-green-700 hover:text-green-600 transition-colors">
            Forgot password?
          </a>
        </div>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••••"
            class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 bg-slate-50 text-slate-800 text-base placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600/20 focus:border-green-600 focus:bg-white transition-all"
          />
        </div>
      </div>

      <!-- Remember Me -->
      <div class="flex items-center gap-3 ml-1 pt-1">
        <input
          type="checkbox"
          id="remember"
          formControlName="remember"
          class="w-5 h-5 rounded-md border-slate-300 accent-[#3D683A] cursor-pointer"
        />
        <label for="remember" class="text-sm font-semibold text-slate-600 cursor-pointer select-none">
          Keep me signed in
        </label>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-[#3D683A] hover:bg-green-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-bold text-base py-4 rounded-2xl mt-2 transition-all shadow-lg shadow-green-800/20 hover:shadow-green-800/30 active:scale-[0.98] flex items-center justify-center gap-2"
      >
        @if (loading) {
          <svg class="animate-spin w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 11-6.219-8.56"/>
          </svg>
          Signing in...
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Sign In
        }
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-8">
      <div class="flex-1 h-[1px] bg-slate-100"></div>
      <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Secured Access</span>
      <div class="flex-1 h-[1px] bg-slate-100"></div>
    </div>

    <!-- Trust badges -->
    <div class="flex items-center justify-center gap-6 text-slate-400">
      <div class="flex items-center gap-1.5 text-xs font-semibold">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        SSL Secured
      </div>
      <div class="flex items-center gap-1.5 text-xs font-semibold">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Encrypted
      </div>
      <div class="flex items-center gap-1.5 text-xs font-semibold">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
        2FA Ready
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-8">
    <p class="text-xs text-slate-400 font-medium text-center">
      © 2026 TheobroTect Systems. All rights reserved.
    </p>
  </footer>

</div>
