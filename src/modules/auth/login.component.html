<div class="min-h-screen bg-[#f8faf9] flex flex-col lg:flex-row font-['Outfit',sans-serif]">
  <div
    class="relative hidden lg:flex lg:w-[45%] bg-[#3D683A] overflow-hidden items-center justify-center p-12 group"
  >
    <div
      class="absolute inset-0 bg-gradient-to-br from-green-950/50 to-[#3D683A] opacity-70 transition-opacity duration-1000 group-hover:opacity-90"
    ></div>
    <div
      class="absolute top-[-20%] left-[-20%] w-[700px] h-[700px] bg-white/5 rounded-full blur-[100px] opacity-40 animate-pulse duration-[10s]"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-black/10 rounded-full blur-[120px] opacity-60"
    ></div>

    <div
      class="absolute top-1/4 right-20 w-8 h-8 rounded-xl border border-white/10 opacity-20 transform rotate-12 group-hover:rotate-45 group-hover:scale-110 group-hover:translate-x-3 group-hover:-translate-y-3 transition-all duration-1000 ease-out"
    ></div>
    <div
      class="absolute bottom-1/4 left-20 w-12 h-12 rounded-full border-2 border-white/5 opacity-10 transform -rotate-12 group-hover:rotate-[-60deg] group-hover:scale-90 group-hover:-translate-x-3 group-hover:translate-y-3 transition-all duration-1000 ease-out"
    ></div>

    <div class="relative z-10 w-full max-w-sm text-center">
      <div
        class="w-32 h-32 bg-white/10 backdrop-blur-2xl rounded-[3rem] flex items-center justify-center mx-auto mb-12 border border-white/20 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.3)] group-hover:scale-105 group-hover:-translate-y-2 transition-all duration-700"
      >
        <img
          src="assets/images/theobrotect_logo.png"
          alt="Brand Logo"
          class="w-20 h-20 object-contain brightness-0 invert"
        />
      </div>

      <h2 class="text-6xl font-black text-white mb-6 tracking-tighter">TheobroTect</h2>
      <div class="h-1.5 w-16 bg-white/40 mx-auto mb-8 rounded-full"></div>
      <p class="text-green-50/90 text-lg leading-relaxed font-light italic">
        "Cultivating security and excellence in every harvest of data."
      </p>

      <div
        class="mt-20 flex justify-center gap-8 opacity-50 group-hover:opacity-80 transition-opacity duration-700"
      >
        <i
          class="pi pi-shield text-white text-2xl hover:scale-110 hover:-translate-y-1 transition-all"
        ></i>
        <i
          class="pi pi-database text-white text-2xl hover:scale-110 hover:-translate-y-1 transition-all"
        ></i>
        <i
          class="pi pi-lock text-white text-2xl hover:scale-110 hover:-translate-y-1 transition-all"
        ></i>
      </div>
    </div>
  </div>

  <div class="flex-1 flex items-center justify-center p-6 sm:p-12 lg:p-24 bg-[#f8faf9] relative">
    <div
      class="lg:hidden absolute top-0 left-0 right-0 p-6 flex items-center justify-center border-b border-slate-100 bg-white shadow-sm z-10"
    >
      <div
        class="w-10 h-10 bg-[#3D683A] rounded-xl flex items-center justify-center mr-3 shadow-lg"
      >
        <img
          src="assets/images/theobrotect_logo.png"
          alt="Brand Logo"
          class="w-6 h-6 brightness-0 invert"
        />
      </div>
      <h1 class="text-2xl font-black text-slate-900 tracking-tighter">TheobroTect</h1>
    </div>

    <div class="w-full max-w-[460px] lg:mt-0 mt-20">
      <div
        class="bg-white border border-slate-100 rounded-[24px] p-10 md:p-12 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] hover:shadow-[0_40px_70px_-20px_rgba(0,0,0,0.1)] hover:-translate-y-2 transition-all duration-700 group/card relative"
      >
        <div
          class="absolute top-4 right-4 w-4 h-4 border-r-4 border-t-4 border-slate-200 group-hover/card:border-[#3D683A] rounded-tr-md transition-colors duration-500"
        ></div>

        <div class="mb-12 text-center md:text-left">
          <h2 class="text-4xl font-black text-slate-950 tracking-tighter">Welcome Back</h2>
          <p class="text-slate-600 mt-2 text-base font-medium">Please enter your credentials.</p>
        </div>

        @if (errorMessage) {
          <div
            class="flex items-center gap-4 bg-red-50 border border-red-100 text-red-600 p-5 mb-10 rounded-2xl animate-in fade-in slide-in-from-top-3 duration-500 shadow-inner"
          >
            <i class="pi pi-exclamation-triangle text-xl"></i>
            <p class="text-xs font-bold uppercase tracking-wider">{{ errorMessage }}</p>
          </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="space-y-2.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-[2px] ml-1"
              >Username / Email</label
            >
            <div class="relative group/input">
              <i
                class="pi pi-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within/input:text-[#3D683A] transition-colors"
              ></i>
              <input
                type="email"
                formControlName="email"
                placeholder="email@theobrotect.com"
                class="w-full pl-13 pr-5 py-4.5 rounded-xl border border-slate-200 bg-slate-50/50 text-slate-900 text-base focus:bg-white focus:outline-none focus:ring-4 focus:ring-[#3D683A]/10 focus:border-[#3D683A] transition-all duration-300"
              />
            </div>
          </div>

          <div class="space-y-2.5">
            <div class="flex items-center justify-between px-1">
              <label class="text-[10px] font-black text-slate-500 uppercase tracking-[2px]"
                >Password</label
              >
            </div>
            <div class="relative group/input">
              <i
                class="pi pi-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within/input:text-[#3D683A] transition-colors"
              ></i>
              <input
                type="password"
                formControlName="password"
                placeholder="••••••••"
                class="w-full pl-13 pr-5 py-4.5 rounded-xl border border-slate-200 bg-slate-50/50 text-slate-900 text-base focus:bg-white focus:outline-none focus:ring-4 focus:ring-[#3D683A]/10 focus:border-[#3D683A] transition-all duration-300"
              />
            </div>
          </div>

          <div
            class="p-4 bg-slate-50/50 border border-slate-100 rounded-xl flex items-center gap-3.5 hover:bg-white hover:border-slate-200 transition-all duration-300 cursor-pointer group/remember"
            onclick="document.getElementById('remember').click()"
          >
            <div class="relative flex items-center">
              <input
                type="checkbox"
                id="remember"
                formControlName="remember"
                class="peer w-5 h-5 rounded border-slate-300 text-[#3D683A] focus:ring-[#3D683A] transition-all cursor-pointer accent-[#3D683A]"
              />
            </div>
            <label
              for="remember"
              class="flex-1 text-xs text-slate-600 font-bold uppercase tracking-wider cursor-pointer group-hover/remember:text-[#3D683A] peer-checked:text-[#3D683A] transition-colors"
              >Remember me</label
            >
          </div>

          <button
            type="submit"
            [disabled]="loading"
            class="w-full bg-[#3D683A] hover:bg-[#2d4d2b] disabled:opacity-50 text-white font-black text-sm uppercase tracking-[2px] py-5 rounded-xl transition-all duration-300 shadow-[0_12px_24px_-8px_rgba(61,104,58,0.5)] hover:shadow-[0_15px_30px_-8px_rgba(61,104,58,0.6)] hover:-translate-y-1 active:scale-[0.98] active:translate-y-0 flex items-center justify-center gap-3.5 relative overflow-hidden"
          >
            <div
              class="absolute inset-0 bg-white/5 opacity-0 hover:opacity-100 animate-pulse duration-[2s]"
            ></div>

            @if (loading) {
              <i class="pi pi-spin pi-spinner text-xl"></i>
              <span>Authenticating...</span>
            } @else {
              <span>Authenticate Session</span>
              <i class="pi pi-angle-right text-lg"></i>
            }
          </button>
        </form>
      </div>

      <div class="mt-12 text-center">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[3px] opacity-60">
          © 2026 TheobroTect
        </p>
      </div>
    </div>
  </div>
</div>
