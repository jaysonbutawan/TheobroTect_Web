<div class="min-h-screen bg-[#f8faf9] flex flex-col lg:flex-row font-['Outfit',sans-serif]">

  <div class="relative hidden lg:flex lg:w-[45%] bg-[#3D683A] overflow-hidden items-center justify-center p-12">
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-white/5 rounded-full blur-[80px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-black/10 rounded-full blur-[80px]"></div>

    <div class="relative z-10 w-full max-w-sm text-center">
      <div class="w-28 h-28 bg-white/10 backdrop-blur-xl rounded-[2.5rem] flex items-center justify-center mx-auto mb-10 border border-white/20 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]">
        <img src="assets/images/theobrotect_logo.png" alt="Brand Logo" class="w-16 h-16 object-contain brightness-0 invert" />
      </div>

      <h2 class="text-5xl font-black text-white mb-6 tracking-tight">TheobroTect</h2>
      <div class="h-1 w-12 bg-white/30 mx-auto mb-6 rounded-full"></div>
      <p class="text-green-50/80 text-lg leading-relaxed font-light italic">
        "Cultivating security and excellence in every harvest of data."
      </p>

      <div class="mt-16 flex justify-center gap-6 opacity-40">
        <i class="pi pi-shield text-white text-xl"></i>
        <i class="pi pi-database text-white text-xl"></i>
        <i class="pi pi-lock text-white text-xl"></i>
      </div>
    </div>

    <div class="absolute bottom-10 left-10 text-white/30 text-[10px] font-black uppercase tracking-[3px]">
      System Node v2.0 // Active
    </div>
  </div>

  <div class="flex-1 flex items-center justify-center p-6 sm:p-12 lg:p-20">
    <div class="w-full max-w-[440px]">

      <div class="lg:hidden flex flex-col items-center mb-10">
        <div class="w-16 h-16 bg-[#3D683A] rounded-2xl flex items-center justify-center mb-4 shadow-xl">
            <img src="assets/images/theobrotect_logo.png" alt="Brand Logo" class="w-10 h-10 brightness-0 invert" />
        </div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">TheobroTect</h1>
      </div>

      <div class="bg-white border border-slate-100 rounded-[20px] p-8 md:p-10 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] hover:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.08)] transition-all duration-500">
        <div class="mb-10 text-center md:text-left">
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
          <p class="text-slate-500 mt-2 text-sm font-medium">Please enter your credentials.</p>
        </div>

        @if (errorMessage) {
          <div class="flex items-center gap-3 bg-red-50 border border-red-100 text-red-600 p-4 mb-8 rounded-xl animate-in fade-in slide-in-from-top-2">
            <i class="pi pi-exclamation-circle"></i>
            <p class="text-xs font-bold uppercase tracking-wide">{{ errorMessage }}</p>
          </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-1">Username</label>
            <div class="relative group">
              <i class="pi pi-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-[#3D683A] transition-colors"></i>
              <input
                type="email"
                formControlName="email"
                placeholder="email@theobrotect.com"
                class="w-full pl-11 pr-4 py-4 rounded-xl border border-slate-200 bg-slate-50/30 text-slate-800 text-sm focus:bg-white focus:outline-none focus:ring-4 focus:ring-[#3D683A]/5 focus:border-[#3D683A] transition-all"
              />
            </div>
          </div>

          <div class="space-y-2">
            <div class="flex items-center justify-between px-1">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-[2px]">Password</label>
            </div>
            <div class="relative group">
              <i class="pi pi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-[#3D683A] transition-colors"></i>
              <input
                type="password"
                formControlName="password"
                placeholder="••••••••"
                class="w-full pl-11 pr-4 py-4 rounded-xl border border-slate-200 bg-slate-50/30 text-slate-800 text-sm focus:bg-white focus:outline-none focus:ring-4 focus:ring-[#3D683A]/5 focus:border-[#3D683A] transition-all"
              />
            </div>
          </div>

          <div class="flex items-center gap-3 py-2">
            <input
              type="checkbox"
              id="remember"
              formControlName="remember"
              class="w-4 h-4 rounded border-slate-300 text-[#3D683A] focus:ring-[#3D683A] transition-all cursor-pointer"
            />
            <label for="remember" class="text-xs text-slate-500 font-bold uppercase tracking-wider cursor-pointer">Remember me</label>
          </div>

          <button
            type="submit"
            [disabled]="loading"
            class="w-full bg-[#3D683A] hover:bg-[#2d4d2b] disabled:opacity-50 text-white font-black text-xs uppercase tracking-[2px] py-5 rounded-xl transition-all shadow-[0_10px_20px_-5px_rgba(61,104,58,0.4)] active:scale-[0.98] flex items-center justify-center gap-3"
          >
            @if (loading) {
              <i class="pi pi-spin pi-spinner text-lg"></i>
              <span>Verifying...</span>
            } @else {
              <span>Authenticate Session</span>
            }
          </button>
        </form>
      </div>

      <div class="mt-10 text-center">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[3px] opacity-50">
          © 2026 TheobroTect Secure Environment
        </p>
      </div>

    </div>
  </div>
</div>
