<div [formGroup]="form" class="space-y-6">
  @if (showSeverity) {
    <div>
      <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-3 ml-1">
        Select Target Severity Level
      </label>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <button
          type="button"
          (click)="onSeveritySelect('mild')"
          class="flex items-center gap-4 p-4 rounded-xl border text-left transition-all duration-300 relative overflow-hidden group focus:outline-none focus:ring-4"
          [class]="
            activeSev === 'mild'
              ? 'bg-emerald-50/40 border-emerald-500 shadow-sm ring-2 ring-emerald-500/10 focus:ring-emerald-500/20'
              : 'bg-white border-slate-200 hover:border-slate-300 hover:bg-slate-50/50 focus:ring-slate-500/10'
          "
        >
          <div
            class="w-5 h-5 rounded-md border flex items-center justify-center transition-all duration-300 flex-shrink-0"
            [class]="
              activeSev === 'mild'
                ? 'bg-emerald-500 border-emerald-500 text-white'
                : 'bg-white border-slate-300 group-hover:border-slate-400'
            "
          >
            @if (activeSev === 'mild') {
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
            }
          </div>
          <div class="flex-1 min-w-0">
            <span
              class="block text-sm font-semibold transition-colors"
              [class]="activeSev === 'mild' ? 'text-emerald-700' : 'text-slate-700'"
            >
              Mild
            </span>
            <span class="block text-xs text-slate-400 mt-0.5 font-normal">
              Early or low-impact signs
            </span>
          </div>
        </button>

        <button
          type="button"
          (click)="onSeveritySelect('moderate')"
          class="flex items-center gap-4 p-4 rounded-xl border text-left transition-all duration-300 relative overflow-hidden group focus:outline-none focus:ring-4"
          [class]="
            activeSev === 'moderate'
              ? 'bg-amber-50/40 border-amber-500 shadow-sm ring-2 ring-amber-500/10 focus:ring-amber-500/20'
              : 'bg-white border-slate-200 hover:border-slate-300 hover:bg-slate-50/50 focus:ring-slate-500/10'
          "
        >
          <div
            class="w-5 h-5 rounded-md border flex items-center justify-center transition-all duration-300 flex-shrink-0"
            [class]="
              activeSev === 'moderate'
                ? 'bg-amber-500 border-amber-500 text-white'
                : 'bg-white border-slate-300 group-hover:border-slate-400'
            "
          >
            @if (activeSev === 'moderate') {
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
            }
          </div>
          <div class="flex-1 min-w-0">
            <span
              class="block text-sm font-semibold transition-colors"
              [class]="activeSev === 'moderate' ? 'text-amber-700' : 'text-slate-700'"
            >
              Moderate
            </span>
            <span class="block text-xs text-slate-400 mt-0.5 font-normal">
              Spreading, structural threat
            </span>
          </div>
        </button>

        <button
          type="button"
          (click)="onSeveritySelect('severe')"
          class="flex items-center gap-4 p-4 rounded-xl border text-left transition-all duration-300 relative overflow-hidden group focus:outline-none focus:ring-4"
          [class]="
            activeSev === 'severe'
              ? 'bg-red-50/40 border-red-500 shadow-sm ring-2 ring-red-500/10 focus:ring-red-500/20'
              : 'bg-white border-slate-200 hover:border-slate-300 hover:bg-slate-50/50 focus:ring-slate-500/10'
          "
        >
          <div
            class="w-5 h-5 rounded-md border flex items-center justify-center transition-all duration-300 flex-shrink-0"
            [class]="
              activeSev === 'severe'
                ? 'bg-red-500 border-red-500 text-white'
                : 'bg-white border-slate-300 group-hover:border-slate-400'
            "
          >
            @if (activeSev === 'severe') {
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
            }
          </div>
          <div class="flex-1 min-w-0">
            <span
              class="block text-sm font-semibold transition-colors"
              [class]="activeSev === 'severe' ? 'text-red-700' : 'text-slate-700'"
            >
              Severe
            </span>
            <span class="block text-xs text-slate-400 mt-0.5 font-normal">
              Critical, immediate action needed
            </span>
          </div>
        </button>
      </div>
    </div>
  }

  <section
    class="bg-white rounded-2xl border border-slate-100 p-6 md:p-8 shadow-[0_4px_20px_rgba(0,0,0,0.01)]"
  >
    <div class="flex items-start gap-3 mb-6">
      <span
        class="flex-shrink-0 inline-flex items-center justify-center w-7 h-7 rounded-lg bg-violet-50 text-violet-600 text-xs font-bold"
        >02</span
      >
      <div>
        <h2 class="text-base font-semibold text-slate-800">Monitoring Setup</h2>
        <p class="text-sm text-slate-500 mt-0.5">Rescan schedule and field worker instructions.</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
          Rescan Interval (Days) <span class="text-red-500">*</span>
        </label>
        <input
          type="number"
          class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-violet-500/10 focus:border-violet-400 transition-all duration-200"
          formControlName="rescanDays"
          placeholder="7"
          min="1"
          max="90"
        />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
          Preferred Scan Time <span class="text-red-500">*</span>
        </label>
        <input
          aria-label="Preferred Scan Time"
          type="time"
          class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 focus:outline-none focus:ring-4 focus:ring-violet-500/10 focus:border-violet-400 transition-all duration-200"
          formControlName="preferredTime"
        />
      </div>

      <div class="col-span-1 md:col-span-2 flex flex-col gap-1.5">
        <label
          class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
        >
          <span class="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-[10px] font-bold"
            >EN</span
          >
          Guidance Message <span class="text-red-500">*</span>
        </label>
        <textarea
          class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-violet-500/10 focus:border-violet-400 transition-all duration-200 resize-none"
          formControlName="guidanceEn"
          rows="2"
          placeholder="Instruction for the field worker, e.g. 'Rescan after 7 days to check if symptoms are improving.'"
          (input)="onEnInput('guidanceEn', 'guidanceTl')"
        ></textarea>
      </div>

      <div class="col-span-1 md:col-span-2 flex flex-col gap-1.5">
        <label
          class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
        >
          <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 text-[10px] font-bold"
            >TL</span
          >
          Mensahe sa Filipino <span class="text-red-500">*</span>

          @if (translating['guidanceTl']) {
            <span
              class="ml-auto flex items-center gap-1 text-[10px] font-normal text-violet-500 normal-case tracking-normal"
            >
              <span
                class="w-2.5 h-2.5 border border-violet-400 border-t-transparent rounded-full animate-spin"
              ></span>
              Nagsasalin...
            </span>
          }
          @if (!translating['guidanceTl'] && form.get('guidanceTl')?.value) {
            <span
              class="ml-auto text-[10px] font-normal text-emerald-500 normal-case tracking-normal"
            >
              Auto-translated
            </span>
          }
        </label>
        <textarea
          class="w-full px-3 py-2 text-sm rounded-lg border border-amber-200 bg-amber-50/30 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-amber-500/10 focus:border-amber-400 transition-all duration-200 resize-none"
          formControlName="guidanceTl"
          rows="2"
          placeholder="Awtomatikong isasalin..."
          [class.opacity-60]="translating['guidanceTl']"
        ></textarea>
      </div>

      <div
        class="col-span-1 md:col-span-2 flex justify-end items-center gap-3 pt-3 border-t border-slate-50 mt-2"
      >
        @if (form.invalid && form.touched) {
          <span class="text-xs text-red-400 italic">
            Mangyaring punan nang tama ang lahat ng kinakailangang impormasyon.
          </span>
        }

        <button
          type="button"
          (click)="saveMonitoringPlan()"
          [disabled]="form.invalid"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-all duration-200 shadow-sm shadow-green-500/10 focus:outline-none focus:ring-4"
          [class]="
            form.invalid
              ? 'bg-slate-200 border border-slate-200 text-slate-400 cursor-not-allowed shadow-none'
              : 'bg-green-600 border border-green-600 hover:bg-green-700 hover:border-green-700 active:scale-98 focus:ring-green-500/20'
          "
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          {{ currentMonitoringPlan?.id ? 'I-update ang Plan' : 'I-save ang Plan' }}
        </button>
      </div>
    </div>
  </section>
</div>
