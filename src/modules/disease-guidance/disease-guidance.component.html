<div
  class="w-full max-w-3xl bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden"
>
  <!-- Header -->
  <div class="flex items-start gap-4 px-8 py-6 border-b border-slate-100">
    <div class="flex-shrink-0 w-10 h-10">
      <img
        src="assets/images/theobrotect_logo.png"
        alt="TheoBroTect Logo"
        class="w-full h-full object-contain"
      />
    </div>
    <div class="flex-1 min-w-0">
      <h1 class="text-lg font-semibold text-slate-800 leading-tight">Add Disease</h1>
      <p class="text-sm text-slate-500 mt-0.5">
        Configure detection labels, monitoring logic, and severity-based guidance. Filipino fields
        auto-translate as you type.
      </p>
    </div>
    <div class="flex-shrink-0">
      <span
        class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-violet-50 text-violet-600 text-xs font-medium border border-violet-100"
      >
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path d="m5 8 6 6" />
          <path d="m4 14 6-6 2-3" />
          <path d="M2 5h12" />
          <path d="M7 2h1" />
          <path d="m22 22-5-10-5 10" />
          <path d="M14 18h6" />
        </svg>
        Auto-translate EN → TL
      </span>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="px-8 py-4 bg-slate-50 border-b border-slate-100">
    <div class="flex items-center gap-0">
      <!-- Step 1 -->
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-xs font-medium text-emerald-600">General Info</span>
      </div>
      <div class="flex-1 h-px bg-slate-200 mx-3"></div>
      <!-- Step 2 -->
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-slate-300"></div>
        <span class="text-xs font-medium text-slate-400">Monitoring</span>
      </div>
      <div class="flex-1 h-px bg-slate-200 mx-3"></div>
      <!-- Step 3 -->
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-slate-300"></div>
        <span class="text-xs font-medium text-slate-400">Recommendations</span>
      </div>
      <div class="flex-1 h-px bg-slate-200 mx-3"></div>
      <!-- Step 4 -->
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-slate-300"></div>
        <span class="text-xs font-medium text-slate-400">Review</span>
      </div>
    </div>
  </div>

  <form class="divide-y divide-slate-100" [formGroup]="form" (ngSubmit)="onSave()">
    <!-- ─── SECTION 01: GENERAL INFO ─── -->
    <section class="px-8 py-7">
      <div class="flex items-start gap-3 mb-6">
        <span
          class="flex-shrink-0 inline-flex items-center justify-center w-7 h-7 rounded-lg bg-blue-50 text-blue-600 text-xs font-bold"
          >01</span
        >
        <div>
          <h2 class="text-base font-semibold text-slate-800">General Information</h2>
          <p class="text-sm text-slate-500 mt-0.5">Basic identity of the disease for the app.</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-x-5 gap-y-5">
        <!-- Name EN -->
        <div class="flex flex-col gap-1.5">
          <label
            class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
          >
            <span class="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-[10px] font-bold"
              >EN</span
            >
            Disease Name
          </label>
          <input
            type="text"
            class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition"
            formControlName="nameEn"
            placeholder="e.g. Black Pod Disease"
          />
        </div>

        <!-- Name TL -->
        <div class="flex flex-col gap-1.5">
          <label
            class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
          >
            <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 text-[10px] font-bold"
              >TL</span
            >
            Pangalan sa Filipino

            <!-- Modern @if / @else if syntax replacing *ngIf -->
            @if (translating['nameTl']) {
              <span
                class="ml-auto flex items-center gap-1 text-[10px] font-normal text-violet-500 normal-case tracking-normal"
              >
                <span
                  class="w-2.5 h-2.5 border border-violet-400 border-t-transparent rounded-full animate-spin"
                ></span>
                Nagsasalin...
              </span>
            } @else if (form.get('nameTl')?.value) {
              <span
                class="ml-auto text-[10px] font-normal text-emerald-500 normal-case tracking-normal"
              >
                Auto-translated
              </span>
            }
          </label>
          <input
            type="text"
            class="w-full px-3 py-2 text-sm rounded-lg border border-amber-200 bg-amber-50/30 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 focus:border-amber-400 transition"
            formControlName="nameTl"
            placeholder="Awtomatikong isasalin..."
            [class.opacity-60]="translating['nameTl']"
          />
        </div>

        <!-- Description EN -->
        <div class="col-span-2 flex flex-col gap-1.5">
          <label
            class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
          >
            <span class="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-[10px] font-bold"
              >EN</span
            >
            Description
          </label>
          <textarea
            class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition resize-none"
            formControlName="descEn"
            rows="3"
            placeholder="Brief overview of the disease, how it spreads, what conditions worsen it..."
            (input)="onEnInput('descEn', 'descTl')"
          ></textarea>
        </div>

        <!-- Description TL -->
        <div class="col-span-2 flex flex-col gap-1.5">
          <label
            class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
          >
            <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 text-[10px] font-bold"
              >TL</span
            >
            Paglalarawan sa Filipino

            <!-- Modern @if / @else if syntax replacing *ngIf -->
            @if (translating['descTl']) {
              <span
                class="ml-auto flex items-center gap-1 text-[10px] font-normal text-violet-500 normal-case tracking-normal"
              >
                <span
                  class="w-2.5 h-2.5 border border-violet-400 border-t-transparent rounded-full animate-spin"
                ></span>
                Nagsasalin...
              </span>
            } @else if (form.get('descTl')?.value) {
              <span
                class="ml-auto text-[10px] font-normal text-emerald-500 normal-case tracking-normal"
              >
                Auto-translated
              </span>
            }
          </label>
          <textarea
            class="w-full px-3 py-2 text-sm rounded-lg border border-amber-200 bg-amber-50/30 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 focus:border-amber-400 transition resize-none"
            formControlName="descTl"
            rows="3"
            placeholder="Awtomatikong isasalin..."
            [class.opacity-60]="translating['descTl']"
          ></textarea>
        </div>
      </div>

      <!-- Detection Labels -->
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide ml-1">
          Detection Label
        </label>

        <div class="flex items-center gap-3">
          <div class="relative flex-1">
            <!-- 2. Add the 'id' attribute here -->
            <select
              aria-label="Select a detection label"
              id="detection-label-select"
              class="w-full appearance-none px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition cursor-pointer pr-10"
              [(ngModel)]="selectedLabel"
              [ngModelOptions]="{ standalone: true }"
            >
              <option value="" disabled selected>Select a label...</option>
              @for (label of detectionLabels; track $index) {
                <option [value]="label">{{ label }}</option>
              }
            </select>

            <!-- Custom Dropdown Chevron Icon -->
            <div
              class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </div>

          <!-- Save Button -->
          <button
            type="button"
            class="flex-shrink-0 inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 focus:ring-2 focus:ring-blue-500/20 focus:outline-none transition shadow-sm"
            (click)="onSave()"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            Save
          </button>
        </div>
      </div>
    </section>
  </form>
</div>
<form class="divide-y divide-slate-100"></form>
