<app-disease-view-modal
  [isOpen]="isViewModalOpen"
  [disease]="viewingDisease"
  (modalClose)="isViewModalOpen = false"
  (editRequested)="onTableEditDisease($event)"
>
</app-disease-view-modal>

<div class="flex flex-col h-screen w-full m-0 p-0 overflow-hidden bg-slate-50/50">
  <div
    class="flex items-start gap-4 px-5 md:px-8 py-5 border-b border-white/60 bg-white/40 flex-shrink-0"
  >
    <div class="flex-1 min-w-0">
      <p class="text-sm text-slate-500 mt-0.5 font-medium">
        Configure detection labels, monitoring logic, and severity-based guidance. Filipino fields
        auto-translate as you type.
      </p>
    </div>
    <div class="flex items-center gap-3 flex-shrink-0">
      <span
        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-violet-500/10 text-violet-700 text-xs font-semibold border border-violet-500/20 shadow-sm"
      >
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path d="m5 8 6 6" />
          <path d="m4 14 6-6 2-3" />
          <path d="M2 5h12" />
          <path d="M7 2h1" />
          <path d="m22 22-5-10-5 10" />
          <path d="M14 18h6" />
        </svg>
        <span class="hidden sm:inline">Auto-translate</span> EN → TL
      </span>

      <button
        type="button"
        (click)="onToggleView()"
        class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold border shadow-sm transition-all duration-300"
        [ngClass]="
          showAddedDiseases
            ? 'bg-green-500 text-white border-green-500 shadow-green-500/20'
            : 'bg-white/60 text-slate-600 border-slate-200 hover:border-green-400 hover:text-green-600'
        "
      >
        @if (showAddedDiseases) {
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
          Add Disease
        } @else {
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
            <rect x="9" y="3" width="6" height="4" rx="1" />
            <path d="M9 12h6M9 16h4" />
          </svg>
          View Added Diseases
        }
      </button>
    </div>
  </div>

 @if (!showAddedDiseases) {
  <app-disease-setup
    [form]="form"
    [currentEditId]="currentEditId"
    [selectedDiseaseKey]="selectedDiseaseKey"
    [editOpenedFromTable]="editOpenedFromTable"
    [sevData]="sevData"
    [selectedLabel]="selectedLabel"
    (save)="onSave()"
    (cancel)="cancelEdit()"
    (diseaseKeyChange)="onDiseaseKeyChange($event)">
  </app-disease-setup>
}

  @if (showAddedDiseases) {
    <div class="flex-1 overflow-auto px-6 py-6">
      @if (isLoading) {
        <app-disease-table-skeleton />
      } @else {
        <app-disease-table
          [existingRecords]="existingRecords"
          [diseaseKeys]="diseaseKeys"
          (view)="onTableViewDisease($event)"
          (edit)="onTableEditDisease($event)"
          (deleteConfirmed)="onTableDeleteConfirmed($event)"
        />
      }
    </div>
  }
</div>
