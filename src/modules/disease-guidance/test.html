<!-- Main Container -->
<div class="max-w-6xl mx-auto p-4 md:p-8 flex flex-col md:flex-row gap-6 items-start">
  <!-- ─── LEFT SIDEBAR: DISEASE LIST ─── -->
  <aside class="w-full md:w-80 flex-shrink-0 flex flex-col gap-3">
    <div class="px-2">
      <h2 class="text-lg font-bold text-slate-800">Added Diseases</h2>
      <p class="text-sm text-slate-500">Select a disease to configure monitoring.</p>
    </div>

    <div class="flex flex-col gap-2 mt-2">
      <!-- Active/Selected Disease Item -->
      <button
        class="w-full text-left p-4 rounded-xl border-2 border-violet-500 bg-violet-50 shadow-sm transition"
      >
        <div class="flex justify-between items-start mb-1">
          <h3 class="font-semibold text-violet-900">Black Pod Disease</h3>
          <span class="flex h-2 w-2 mt-1.5">
            <span
              class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-violet-400 opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-violet-500"></span>
          </span>
        </div>
        <p class="text-xs text-violet-600 mb-2">Sakit na Itim na Bunga</p>
        <span
          class="inline-flex px-2 py-0.5 rounded text-[10px] font-bold bg-white text-violet-700 border border-violet-200"
        >
          black_pod_disease_severe
        </span>
      </button>

      <!-- Inactive Disease Item -->
      <button
        class="w-full text-left p-4 rounded-xl border border-slate-200 bg-white hover:border-slate-300 hover:shadow-sm transition"
      >
        <div class="flex justify-between items-start mb-1">
          <h3 class="font-semibold text-slate-700">Cacao Pod Borer</h3>
        </div>
        <p class="text-xs text-slate-500 mb-2">Uod sa Bunga ng Kakaw</p>
        <span
          class="inline-flex px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-600 border border-slate-200"
        >
          cacao_pod_borer_mild
        </span>
      </button>
    </div>
  </aside>

  <!-- ─── RIGHT PANEL: CONFIGURATION FORM ─── -->
  <main
    class="flex-1 w-full bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden"
  >
    <!-- Context Header -->
    <div
      class="px-8 py-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center"
    >
      <div>
        <p class="text-xs font-semibold text-violet-600 uppercase tracking-wider mb-0.5">
          Currently Editing
        </p>
        <h1 class="text-xl font-bold text-slate-800">Black Pod Disease</h1>
      </div>
      <span
        class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-medium border border-slate-200"
      >
        Draft Mode
      </span>
    </div>

    <!-- The Form -->
    <form class="divide-y divide-slate-100" [formGroup]="form" (ngSubmit)="onSave()">
      <!-- ─── SECTION 02: MONITORING SETUP (Your Code) ─── -->
      <section class="px-8 py-7">
        <div class="flex items-start gap-3 mb-6">
          <span
            class="flex-shrink-0 inline-flex items-center justify-center w-7 h-7 rounded-lg bg-violet-50 text-violet-600 text-xs font-bold"
          >
            02
          </span>
          <div>
            <h2 class="text-base font-semibold text-slate-800">Monitoring Setup</h2>
            <p class="text-sm text-slate-500 mt-0.5">
              Rescan schedule and field worker instructions.
            </p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-x-5 gap-y-5">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
              Rescan Interval (Days) <span class="text-red-500">*</span>
            </label>
            <input
              type="number"
              class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 transition"
              formControlName="rescanDays"
              placeholder="7"
              min="1"
              max="90"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
              Preferred Scan Time <span class="text-red-500">*</span>
            </label>
            <input
              aria-label="reaw"
              type="time"
              class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 transition"
              formControlName="preferredTime"
            />
          </div>

          <!-- Guidance EN -->
          <div class="col-span-2 flex flex-col gap-1.5">
            <label
              class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
            >
              <span class="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-[10px] font-bold"
                >EN</span
              >
              Guidance Message <span class="text-red-500">*</span>
            </label>
            <textarea
              class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 transition resize-none"
              formControlName="guidanceEn"
              rows="2"
              placeholder="Instruction for the field worker, e.g. 'Rescan after 7 days to check if symptoms are improving.'"
              (input)="onEnInput('guidanceEn', 'guidanceTl')"
            ></textarea>
          </div>

          <!-- Guidance TL -->
          <div class="col-span-2 flex flex-col gap-1.5">
            <label
              class="flex items-center gap-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wide"
            >
              <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 text-[10px] font-bold"
                >TL</span
              >
              Mensahe sa Filipino <span class="text-red-500">*</span>
              <span
                class="ml-auto flex items-center gap-1 text-[10px] font-normal text-violet-500 normal-case tracking-normal"
                *ngIf="translating['guidanceTl']"
              >
                <span
                  class="w-2.5 h-2.5 border border-violet-400 border-t-transparent rounded-full animate-spin"
                ></span>
                Nagsasalin...
              </span>
              <span
                class="ml-auto text-[10px] font-normal text-emerald-500 normal-case tracking-normal"
                *ngIf="!translating['guidanceTl'] && form.get('guidanceTl')?.value"
              >
                Auto-translated
              </span>
            </label>
            <textarea
              class="w-full px-3 py-2 text-sm rounded-lg border border-amber-200 bg-amber-50/30 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 focus:border-amber-400 transition resize-none"
              formControlName="guidanceTl"
              rows="2"
              placeholder="Awtomatikong isasalin..."
              [class.opacity-60]="translating['guidanceTl']"
            ></textarea>
          </div>
        </div>

        <!-- Monitoring Checklist -->
        <div class="mt-6">
          <label
            class="flex flex-col gap-0.5 text-xs font-semibold text-slate-600 uppercase tracking-wide mb-3"
          >
            Monitoring Checklist
            <span class="font-normal normal-case tracking-normal text-slate-400"
              >Tasks field workers should check before rescanning.</span
            >
          </label>

          <div class="flex flex-col gap-2">
            <div
              class="rounded-lg border border-slate-200 overflow-hidden bg-white"
              *ngFor="let item of checklistItems; let i = index"
            >
              <div class="flex items-center gap-0">
                <div class="flex items-center gap-2 flex-1 px-3 py-2 border-r border-slate-200">
                  <span
                    class="flex-shrink-0 px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-[10px] font-bold"
                    >EN</span
                  >
                  <input
                    type="text"
                    class="flex-1 text-sm text-slate-800 placeholder-slate-400 bg-transparent focus:outline-none"
                    [(ngModel)]="checklistItems[i].en"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Checklist item in English..."
                    (input)="onBulletEnInput(checklistItems[i], 'en', 'tl')"
                  />
                </div>
                <div class="flex items-center gap-2 flex-1 px-3 py-2">
                  <span
                    class="flex-shrink-0 flex items-center gap-1 px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 text-[10px] font-bold"
                  >
                    TL
                    <span
                      class="w-2 h-2 border border-amber-500 border-t-transparent rounded-full animate-spin"
                      *ngIf="checklistItems[i].translating"
                    ></span>
                  </span>
                  <input
                    type="text"
                    class="flex-1 text-sm text-slate-800 placeholder-slate-400 bg-transparent focus:outline-none"
                    [(ngModel)]="checklistItems[i].tl"
                    [ngModelOptions]="{ standalone: true }"
                    placeholder="Awtomatikong isasalin..."
                    [class.opacity-50]="checklistItems[i].translating"
                  />
                </div>
                <button
                  aria-label="remove"
                  type="button"
                  class="flex-shrink-0 w-8 h-full flex items-center justify-center border-l border-slate-200 text-slate-400 hover:bg-red-50 hover:text-red-500 transition"
                  (click)="removeChecklist(i)"
                >
                  <svg
                    width="12"
                    height="12"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                  >
                    <path d="M18 6 6 18M6 6l12 12" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <button
            type="button"
            class="mt-3 inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border border-dashed border-slate-300 text-xs font-medium text-slate-500 hover:border-violet-400 hover:text-violet-600 hover:bg-violet-50 transition"
            (click)="addChecklist()"
          >
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M5 12h14M12 5v14" />
            </svg>
            Add Checklist Item
          </button>
        </div>
      </section>

      <!-- ─── FOOTER ACTIONS ─── -->
      <div class="px-8 py-4 bg-slate-50 flex items-center justify-end gap-3">
        <button
          type="button"
          class="px-4 py-2 text-sm font-semibold text-slate-600 hover:text-slate-800 transition"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="inline-flex items-center gap-1.5 px-5 py-2 rounded-lg bg-violet-600 text-white text-sm font-semibold hover:bg-violet-700 focus:ring-2 focus:ring-violet-500/20 focus:outline-none transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="form.invalid"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Save Configuration
        </button>
      </div>
    </form>
  </main>
</div>
