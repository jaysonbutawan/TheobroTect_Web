<aside 
  [class.w-64]="!isCollapsed"
  [class.w-20]="isCollapsed"
  class="h-full flex flex-col py-5 px-3 overflow-y-auto bg-transparent border-r border-slate-100 transition-all duration-300 ease-in-out overflow-x-hidden"
>
  <div class="flex items-center gap-3 mb-10 px-2 group cursor-pointer justify-start">
    <div class="flex-shrink-0 w-12 h-12 flex items-center justify-center transition-all duration-300">
      <img
        src="assets/images/theobrotect_logo.png"
        alt="Theobrotect Logo"
        class="w-full h-full object-contain group-hover:brightness-110 transition-all duration-300"
      />
    </div>
    <span *ngIf="!isCollapsed" class="font-bold text-slate-800 whitespace-nowrap">Theobrotect</span>
  </div>

  <nav class="flex-1 space-y-1">
    <ng-container
      *ngTemplateOutlet="navLink; context: {
          link: '/dashboard',
          exact: true,
          label: 'Dashboard',
          collapsed: isCollapsed,
          path: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z'
        }"
    ></ng-container>

    <ng-container
      *ngTemplateOutlet="navLink; context: {
          link: '/dashboard/user-management',
          exact: false,
          label: 'User Management',
          collapsed: isCollapsed,
          path: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z'
        }"
    ></ng-container>

    <ng-container
      *ngTemplateOutlet="navLink; context: {
          link: '/dashboard/field-reports',
          exact: false,
          label: 'Field Reports',
          collapsed: isCollapsed,
          path: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'
        }"
    ></ng-container>
  </nav>

  <div class="mt-auto pt-5 border-t border-slate-100 space-y-1">
    
    <button
      (click)="isCollapsed = !isCollapsed"
      class="group flex items-center gap-3 px-3 py-3 rounded-xl text-slate-500 font-semibold text-sm hover:bg-slate-50 transition-all duration-200 w-full text-left"
    >
      <div class="w-6 flex justify-center">
        <svg
          class="w-5 h-5 shrink-0 transition-transform duration-300"
          [class.rotate-180]="isCollapsed"
          fill="none" stroke="currentColor" viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
        </svg>
      </div>
      <span *ngIf="!isCollapsed" class="whitespace-nowrap">Collapse Menu</span>
    </button>

    <a
      routerLink="/settings"
      routerLinkActive="active bg-green-700 text-white"
      class="group flex items-center gap-3 px-3 py-3 rounded-xl text-slate-500 font-semibold text-sm hover:bg-green-50 hover:text-green-800 transition-all duration-200"
      [title]="isCollapsed ? 'Settings' : ''"
    >
      <div class="w-6 flex justify-center">
        <svg class="w-5 h-5 shrink-0 group-hover:rotate-45 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <span *ngIf="!isCollapsed" class="whitespace-nowrap">Settings</span>
    </a>

    <button
      class="group flex items-center gap-3 px-3 py-3 rounded-xl text-slate-400 font-semibold text-sm hover:bg-red-50 hover:text-red-500 transition-all duration-200 w-full text-left"
      [title]="isCollapsed ? 'Sign Out' : ''"
    >
      <div class="w-6 flex justify-center">
        <svg class="w-5 h-5 shrink-0 group-hover:translate-x-0.5 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </div>
      <span *ngIf="!isCollapsed" class="whitespace-nowrap">Sign Out</span>
    </button>
  </div>
</aside>

<ng-template #navLink let-link="link" let-exact="exact" let-label="label" let-path="path" let-collapsed="collapsed">
  <a
    [routerLink]="link"
    [routerLinkActiveOptions]="{ exact: exact }"
    routerLinkActive="active bg-green-700 text-white shadow-md shadow-green-900/20"
    class="group flex items-center gap-3 px-3 py-3 rounded-xl text-slate-500 font-semibold text-sm tracking-wide transition-all duration-200 hover:bg-green-50 hover:text-green-800"
    [title]="collapsed ? label : ''"
  >
    <div class="w-6 flex justify-center shrink-0">
      <svg
        class="w-5 h-5 shrink-0 group-hover:scale-110 transition-transform duration-200"
        fill="none" stroke="currentColor" viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="path" />
      </svg>
    </div>
    
    <span *ngIf="!collapsed" class="whitespace-nowrap transition-opacity duration-200">
      {{ label }}
    </span>

    <span
      *ngIf="!collapsed"
      class="ml-auto w-1.5 h-5 rounded-full bg-green-300 opacity-0 group-[.active]:opacity-100 transition-opacity duration-200"
    ></span>
  </a>
</ng-template>
