<aside
  [class.w-64]="!isCollapsed"
  [class.w-20]="isCollapsed"
  class="h-full flex flex-col py-6 pl-4 pr-0 overflow-y-auto bg-[#345e37] transition-all duration-300 ease-in-out overflow-x-hidden select-none font-['DM_Sans',sans-serif]"
>
  <div
  (click)="toggleSidebar()"
  class="flex items-center gap-4 mb-12 px-3 group cursor-pointer justify-start select-none"
>
  <div class="flex-shrink-0 w-11 h-11 bg-white/[0.08] backdrop-blur-md border border-white/15 rounded-2xl flex items-center justify-center transition-all duration-300 group-hover:bg-white/[0.12] group-hover:border-white/25 shadow-sm">
    <img
      src="assets/images/theobrotect_logo.png"
      alt="Theobrotect Logo"
      class="w-[22px] h-[22px] object-contain group-hover:scale-105 transition-transform duration-300 brightness-0 invert"
    />
  </div>

  @if (!isCollapsed) {
    <div class="flex flex-col justify-center transition-all duration-300 animate-in fade-in slide-in-from-left-2">
      <span class="text-white/40 text-[10px] font-bold tracking-[2px] uppercase leading-none mb-1.5 sub-heading-glow">
        System
      </span>
      <span class="font-bold text-white text-[17px] tracking-tight leading-none whitespace-nowrap group-hover:text-emerald-50 transition-colors">
        Theobrotect
      </span>
    </div>
  }
</div>

  <nav class="flex-1 space-y-1">
    <ng-container
      *ngTemplateOutlet="
        navLink;
        context: {
          link: '/dashboard',
          exact: true,
          label: 'Dashboard',
          collapsed: isCollapsed,
          path: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z',
        }
      "
    ></ng-container>

    <ng-container
      *ngTemplateOutlet="
        navLink;
        context: {
          link: '/dashboard/user-management',
          exact: false,
          label: 'User Management',
          collapsed: isCollapsed,
          path: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z',
        }
      "
    ></ng-container>

    <ng-container
      *ngTemplateOutlet="
        navLink;
        context: {
          link: '/dashboard/field-reports',
          exact: false,
          label: 'Field Reports',
          collapsed: isCollapsed,
          path: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z',
        }
      "
    ></ng-container>

    <ng-container
      *ngTemplateOutlet="
        navLink;
        context: {
          link: '/dashboard/heatmap',
          exact: false,
          label: 'Heat Maps',
          collapsed: isCollapsed,
          path: 'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z M15 11a3 3 0 11-6 0 3 3 0 016 0z',
        }
      "
    ></ng-container>

    <ng-container
      *ngTemplateOutlet="
        navLink;
        context: {
          link: '/dashboard/guide',
          exact: false,
          label: 'Disease Guide',
          collapsed: isCollapsed,
          path: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253',
        }
      "
    ></ng-container>
  </nav>

  <div class="mt-auto pt-5 border-t border-white/10 pr-4 space-y-1">
    <a
      routerLink="/settings"
      routerLinkActive="text-white bg-white/10"
      class="group flex items-center gap-4 px-3 py-3 rounded-2xl text-white/70 font-medium text-[13px] hover:bg-white/5 hover:text-white transition-all duration-200"
      [title]="isCollapsed ? 'Settings' : ''"
    >
      <div class="w-8 h-8 bg-white/10 rounded-xl flex items-center justify-center shrink-0">
        <svg
          class="w-[15px] h-[15px] shrink-0 group-hover:rotate-45 transition-transform duration-300"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      @if (!isCollapsed) {
        <span>Settings</span>
      }
    </a>

    <button
      class="group flex items-center gap-4 px-3 py-3 rounded-2xl text-white/50 font-medium text-[13px] hover:bg-red-500/10 hover:text-red-300 transition-all duration-200 w-full text-left"
      [title]="isCollapsed ? 'Sign Out' : ''"
    >
      <div class="w-8 h-8 bg-white/5 rounded-xl flex items-center justify-center shrink-0">
        <svg
          class="w-[15px] h-[15px] shrink-0 group-hover:translate-x-0.5 transition-transform duration-200"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </div>
      @if (!isCollapsed) {
        <span>Sign Out</span>
      }
    </button>
  </div>
</aside>

<ng-template
  #navLink
  let-link="link"
  let-exact="exact"
  let-label="label"
  let-path="path"
  let-collapsed="collapsed"
>
  <a
    [routerLink]="link"
    [routerLinkActiveOptions]="{
      paths: exact ? 'exact' : 'subset',
      queryParams: 'ignored',
      matrixParams: 'ignored',
      fragment: 'ignored',
    }"
    routerLinkActive="active-curve text-[#345e37] bg-[#f5f5f7]"
    class="group relative flex items-center gap-4 pl-3 pr-0 py-3 rounded-l-[24px] rounded-r-none text-white/80 font-medium text-[13px] w-full transition-all duration-150"
    [title]="collapsed ? label : ''"
  >
    <div class="w-8 h-8 bg-white/10 rounded-xl flex items-center justify-center shrink-0 transition-all duration-200 group-hover:bg-white/20 group-[.active-curve]:bg-[#345e37]/10">
      <svg
        class="w-[14px] h-[14px] shrink-0 transition-transform duration-200 group-hover:scale-105 text-white group-[.active-curve]:text-[#345e37]"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="path" />
      </svg>
    </div>

    @if (!collapsed) {
      <span class="whitespace-nowrap transition-colors duration-200 group-hover:text-white group-[.active-curve]:text-[#345e37]">
        {{ label }}
      </span>
    }
  </a>
</ng-template>
