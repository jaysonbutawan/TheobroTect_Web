<div class="backdrop-blur-xl bg-white/40 border border-white/20 rounded-[2rem] shadow-xl p-4 sm:p-6 w-full h-[400px] sm:h-[500px] flex flex-col justify-between transition-all duration-300">

  <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 border-b border-gray-100/40 pb-5 mb-5">

  <div class="space-y-1">
    <h3 class="text-base sm:text-lg font-bold text-gray-800 tracking-tight">Detection Trends</h3>
    <p class="text-xs text-gray-500">Monthly breakdown of cacao health cases</p>
  </div>

  <div class="flex flex-col sm:flex-row sm:items-center justify-between lg:justify-end gap-4 sm:gap-6 w-full lg:w-auto">

    <div class="flex flex-wrap items-center gap-x-4 gap-y-2 bg-white/20 backdrop-blur-sm p-2 sm:p-0 rounded-xl sm:bg-transparent sm:backdrop-blur-none">

      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-full bg-red-600 shadow-sm shadow-red-600/30 flex-shrink-0"></span>
        <span class="text-xs font-semibold text-slate-700">Black Pod Rot</span>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-full bg-yellow-500 shadow-sm shadow-yellow-500/30 flex-shrink-0"></span>
        <span class="text-xs font-semibold text-slate-700">Pod Borer</span>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-sm shadow-blue-500/30 flex-shrink-0"></span>
        <span class="text-xs font-semibold text-slate-700">Mealybug</span>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-sm shadow-emerald-500/30 flex-shrink-0"></span>
        <span class="text-xs font-semibold text-slate-700">Healthy Pods</span>
      </div>
    </div>

    <div class="relative min-w-[120px] w-full sm:w-auto self-end sm:self-auto">
      <select
        aria-label="Select Year"
        (change)="onYearChange($event)"
        class="w-full sm:w-[130px] bg-white/70 backdrop-blur-md border border-gray-200/50 rounded-xl pl-4 pr-10 py-2 text-xs font-bold text-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-green-600/40 hover:bg-white/90 transition-all cursor-pointer appearance-none">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>

      <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
        </svg>
      </div>
    </div>

  </div>
</div>

  <div class="relative flex-grow min-h-0 w-full">
    <canvas baseChart
      [data]="chartData"
      [options]="lineChartOptions"
      [type]="'line'">
    </canvas>
  </div>
</div>
